name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build binary — ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            os: ubuntu-latest
            asset: collab-editor-linux-x86_64
          - platform: linux-aarch64
            os: ubuntu-24.04-arm
            asset: collab-editor-linux-aarch64
          - platform: darwin-aarch64
            os: macos-latest
            asset: collab-editor-darwin-aarch64

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun run build:binary

      - name: Rename binary
        run: mv collab-editor-app ${{ matrix.asset }}

      - name: Package binary
        run: tar -czf ${{ matrix.asset }}.tar.gz ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: binary-${{ matrix.platform }}
          path: ${{ matrix.asset }}.tar.gz
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.tar.gz
